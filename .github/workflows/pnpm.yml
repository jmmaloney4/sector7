name: '📦 pnpm'
on:
  workflow_call:
    inputs:
      runs-on:
        description: 'Runner label for all jobs'
        required: false
        default: 'self-hosted'
        type: string
      repository:
        description: 'Repository to checkout and build (owner/repo)'
        required: true
        type: string
      ref:
        description: 'Git ref to checkout and build'
        required: true
        type: string
      dry_run:
        description: 'Run in dry-run mode (show analysis without publishing)'
        required: false
        type: boolean
        default: false
      target:
        description: 'Publish target. Only "release" (GitHub Release tarball) is supported.'
        required: false
        type: string
        default: 'release'
      binary-cache-url:
        description: 'Optional full binary cache URL to add as a substituter (e.g. https://cache.example.com/cache)'
        required: false
        default: ''
        type: string
      binary-cache-public-key:
        description: 'Optional trusted public key for the binary cache'
        required: false
        default: ''
        type: string
      binary-cache-endpoint:
        description: 'Optional Attic server endpoint (root URL) used for cache pushes'
        required: false
        default: ''
        type: string
      binary-cache-name:
        description: 'Optional Attic cache name used for cache pushes'
        required: false
        default: ''
        type: string
    secrets:
      BINARY_CACHE_TOKEN:
        description: 'Optional Attic token used to push built store paths into the binary cache'
        required: false
jobs:
  analyze:
    name: "🧱 analyze pnpm packages"
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
      packages: read
    outputs:
      matrix: ${{ steps.analyze.outputs.matrix }}
      has_packages: ${{ steps.analyze.outputs.has_packages }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
      - uses: jmmaloney4/sector7/.github/actions/nix-setup@main
        with:
          runs-on: ${{ inputs.runs-on }}
          # Keep the FlakeHub fallback enabled unless a fully-configured custom
          # cache is available (URL + public key both set). A URL without a
          # public key leaves nix-setup with an unverifiable substituter.
          cache: ${{ !contains(inputs.runs-on, 'self-hosted') && !(inputs.binary-cache-url != '' && inputs.binary-cache-public-key != '') }}
          extra-substituters: ${{ inputs.binary-cache-url != '' && inputs.binary-cache-public-key != '' && inputs.binary-cache-url || '' }}
          extra-trusted-public-keys: ${{ inputs.binary-cache-url != '' && inputs.binary-cache-public-key != '' && inputs.binary-cache-public-key || '' }}
          attic-endpoint: ${{ inputs.binary-cache-endpoint != '' && inputs.binary-cache-name != '' && secrets.BINARY_CACHE_TOKEN != '' && inputs.binary-cache-endpoint || '' }}
          attic-cache-name: ${{ inputs.binary-cache-endpoint != '' && inputs.binary-cache-name != '' && secrets.BINARY_CACHE_TOKEN != '' && inputs.binary-cache-name || '' }}
          attic-token: ${{ inputs.binary-cache-endpoint != '' && inputs.binary-cache-name != '' && secrets.BINARY_CACHE_TOKEN != '' && secrets.BINARY_CACHE_TOKEN || '' }}
      - name: Add ci-pnpm tools to PATH
        run: nix develop .#ci-pnpm --command bash -c 'echo "$PATH" >> "$GITHUB_PATH"'
      - name: Analyze packages (target=${{ inputs.target }})
        id: analyze
        uses: jmmaloney4/sector7/.github/actions/analyze-pnpm-packages@main
        with:
          dry_run: ${{ inputs.dry_run }}
          target: ${{ inputs.target }}
          github_repository: ${{ inputs.repository }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Debug matrix output
        run: |
          echo "Matrix output:"
          echo '${{ steps.analyze.outputs.matrix }}'
          echo ""
          echo "Matrix length:"
          echo "${{ fromJson(steps.analyze.outputs.matrix || '[]').length }}"
          echo ""
          echo "Matrix as JSON:"
          echo '${{ toJson(fromJson(steps.analyze.outputs.matrix || '[]')) }}'
  verify-lockfile:
    name: "🔒 verify pnpm-lock.yaml"
    runs-on: ${{ inputs.runs-on }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
      - uses: jmmaloney4/sector7/.github/actions/nix-setup@main
        with:
          runs-on: ${{ inputs.runs-on }}
          # Keep the FlakeHub fallback enabled unless a fully-configured custom
          # cache is available (URL + public key both set). A URL without a
          # public key leaves nix-setup with an unverifiable substituter.
          cache: ${{ !contains(inputs.runs-on, 'self-hosted') && !(inputs.binary-cache-url != '' && inputs.binary-cache-public-key != '') }}
          extra-substituters: ${{ inputs.binary-cache-url != '' && inputs.binary-cache-public-key != '' && inputs.binary-cache-url || '' }}
          extra-trusted-public-keys: ${{ inputs.binary-cache-url != '' && inputs.binary-cache-public-key != '' && inputs.binary-cache-public-key || '' }}
          attic-endpoint: ${{ inputs.binary-cache-endpoint != '' && inputs.binary-cache-name != '' && secrets.BINARY_CACHE_TOKEN != '' && inputs.binary-cache-endpoint || '' }}
          attic-cache-name: ${{ inputs.binary-cache-endpoint != '' && inputs.binary-cache-name != '' && secrets.BINARY_CACHE_TOKEN != '' && inputs.binary-cache-name || '' }}
          attic-token: ${{ inputs.binary-cache-endpoint != '' && inputs.binary-cache-name != '' && secrets.BINARY_CACHE_TOKEN != '' && secrets.BINARY_CACHE_TOKEN || '' }}
      - name: Verify lockfile is up to date
        run: nix develop .#ci-pnpm --command pnpm install --frozen-lockfile
  publish-packages:
    name: "🚀 publish (${{ inputs.target }}): ${{ matrix.name }}"
    needs: [analyze, verify-lockfile]
    runs-on: ${{ inputs.runs-on }}
    if: needs.analyze.outputs.has_packages == 'true'
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.analyze.outputs.matrix || '[]') }}
    permissions:
      contents: write # needed for release asset upload
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          repository: ${{ inputs.repository }}
          ref: ${{ inputs.ref }}
      - uses: jmmaloney4/sector7/.github/actions/nix-setup@main
        with:
          runs-on: ${{ inputs.runs-on }}
          # Keep the FlakeHub fallback enabled unless a fully-configured custom
          # cache is available (URL + public key both set). A URL without a
          # public key leaves nix-setup with an unverifiable substituter.
          cache: ${{ !contains(inputs.runs-on, 'self-hosted') && !(inputs.binary-cache-url != '' && inputs.binary-cache-public-key != '') }}
          extra-substituters: ${{ inputs.binary-cache-url != '' && inputs.binary-cache-public-key != '' && inputs.binary-cache-url || '' }}
          extra-trusted-public-keys: ${{ inputs.binary-cache-url != '' && inputs.binary-cache-public-key != '' && inputs.binary-cache-public-key || '' }}
          attic-endpoint: ${{ inputs.binary-cache-endpoint != '' && inputs.binary-cache-name != '' && secrets.BINARY_CACHE_TOKEN != '' && inputs.binary-cache-endpoint || '' }}
          attic-cache-name: ${{ inputs.binary-cache-endpoint != '' && inputs.binary-cache-name != '' && secrets.BINARY_CACHE_TOKEN != '' && inputs.binary-cache-name || '' }}
          attic-token: ${{ inputs.binary-cache-endpoint != '' && inputs.binary-cache-name != '' && secrets.BINARY_CACHE_TOKEN != '' && secrets.BINARY_CACHE_TOKEN || '' }}
      - name: Add ci-pnpm tools to PATH
        run: nix develop .#ci-pnpm --command bash -c 'echo "$PATH" >> "$GITHUB_PATH"'
      - name: Install dependencies
        run: nix develop .#ci-pnpm --command pnpm install --frozen-lockfile
      - name: Build packages
        run: nix develop .#ci-pnpm --command pnpm -r --if-present build
      - name: Summary (per-package)
        run: |
          echo "## 📦 Publish Plan for ${{ matrix.name }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "> **DRY RUN** - No publish will occur" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Target:** \`${{ matrix.target }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Path:** \`${{ matrix.package_path }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Version:** \`${{ matrix.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag:** \`${{ matrix.tag }}\`" >> $GITHUB_STEP_SUMMARY
      # ── Release tarball target ──────────────────────────────────────
      - name: Pack tarball
        if: inputs.dry_run != true && matrix.action == 'publish' && matrix.target == 'release'
        run: |
          nix develop .#ci-pnpm --command pnpm pack
          echo "Packed artifacts:"
          ls -la *.tgz
        working-directory: ${{ matrix.package_path }}
      - name: Verify compiled package tarball
        if: inputs.dry_run != true && matrix.action == 'publish' && matrix.target == 'release'
        shell: bash
        working-directory: ${{ matrix.package_path }}
        run: |
          ASSET="${{ matrix.asset_name }}"
          if [[ ! -f "$ASSET" ]]; then
            echo "❌ Expected packed tarball not found: $ASSET"
            exit 1
          fi

          tar -tzf "$ASSET" > /tmp/sector7-tarball-contents.txt

          if awk '/^package\/.*\.ts$/ && $0 !~ /\.d\.ts$/ { print; found=1 } END { exit found ? 0 : 1 }' /tmp/sector7-tarball-contents.txt; then
            echo "❌ Tarball contains raw TypeScript source files. Published packages must ship compiled JavaScript plus declarations."
            exit 1
          fi

          if ! grep -qx 'package/dist/index.js' /tmp/sector7-tarball-contents.txt; then
            echo "❌ Tarball is missing package/dist/index.js"
            exit 1
          fi

          if ! grep -qx 'package/dist/index.d.ts' /tmp/sector7-tarball-contents.txt; then
            echo "❌ Tarball is missing package/dist/index.d.ts"
            exit 1
          fi

          echo "✅ Tarball contains compiled JavaScript and declarations only"
      - name: Upload tarball to release
        if: inputs.dry_run != true && matrix.action == 'publish' && matrix.target == 'release'
        run: |
          TAG="${{ matrix.tag }}"
          ASSET="${{ matrix.asset_name }}"
          ASSET_PATH="${{ matrix.package_path }}/${ASSET}"

          if [[ ! -f "$ASSET_PATH" ]]; then
            echo "❌ Expected tarball not found: $ASSET_PATH"
            echo "Available files:"
            ls -la "${{ matrix.package_path }}"/*.tgz 2>/dev/null || echo "  (none)"
            exit 1
          fi

          # Create release if it doesn't exist (first package in the matrix).
          # Subsequent packages upload their tarball to the same release.
          # gh release create returns exit 1 when the tag already exists.
          # We capture only stderr (redirect stdout to /dev/null) so that
          # the success URL on stdout doesn't pollute the error check.
          CREATE_STDERR="$(gh release create "$TAG" \
            --repo "${{ inputs.repository }}" \
            --title "${TAG}" \
            --notes "Published \`${{ matrix.name }}@${{ matrix.version }}\`." \
            2>&1 >/dev/null)" || true
          if echo "$CREATE_STDERR" | grep -qi "already exists\|release.*already"; then
            echo "ℹ️ Release ${TAG} already exists (parallel matrix job created it)"
          elif [[ -n "$CREATE_STDERR" ]]; then
            echo "❌ gh release create failed: $CREATE_STDERR"
            exit 1
          else
            echo "✅ Release ${TAG} created"
          fi

          echo "Uploading ${ASSET} to release ${TAG}"
          gh release upload "$TAG" "$ASSET_PATH" \
            --repo "${{ inputs.repository }}" \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Cleanup packed tarball
        if: inputs.dry_run != true && matrix.action == 'publish' && matrix.target == 'release'
        run: rm -f ${{ matrix.package_path }}/*.tgz
