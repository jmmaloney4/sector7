name: Nix Setup
description: Install Nix and optionally configure additional binary caches for GitHub Actions
inputs:
  runs-on:
    description: Runner label to determine if runs-on/actions@v2 should be used
    required: true
    type: string
  cache:
    description: Enable FlakeHub cache (set to 'false' for self-hosted runners with cache already configured)
    required: false
    default: 'true'
  extra-substituters:
    description: Optional newline-delimited extra substituter URLs to append to the runner Nix config
    required: false
    default: ''
  extra-trusted-public-keys:
    description: Optional newline-delimited extra trusted public keys to append to the runner Nix config
    required: false
    default: ''
  attic-endpoint:
    description: Optional Attic server endpoint (root URL). When set together with attic-cache-name and attic-token, starts `attic watch-store` to push built store paths to the cache incrementally for the rest of the job.
    required: false
    default: ''
  attic-cache-name:
    description: Optional Attic cache name to push into via watch-store.
    required: false
    default: ''
  attic-token:
    description: Optional Attic token with push permission, used by watch-store.
    required: false
    default: ''
runs:
  using: composite
  steps:
    - if: ${{ contains(inputs.runs-on, 'runner=') }} && ${{ contains(inputs.runs-on, 's3-cache') }}
      uses: runs-on/action@d141ef83eb66d096ce8afc767e09115a65c63b60 # v2.1.2
      with:
        show_costs: true
        sccache: s3
    # If the runner has a host Nix daemon available (its /nix store and daemon
    # socket bind-mounted from the node — see garden's ARC runner template), use
    # that warm, shared store instead of installing a second, per-pod Nix. Two
    # independent daemons writing one /nix corrupt the store, so every step that
    # installs or configures in-pod Nix below is gated on the host daemon being
    # ABSENT. This auto-detects via the socket, so consumers without a host
    # daemon (cloud runners) are unaffected, and it safely no-ops until the
    # mount is actually present.
    - name: Detect host Nix daemon
      id: host-daemon
      shell: bash
      run: |
        if [ -S /nix/var/nix/daemon-socket/socket ]; then
          echo "Host Nix daemon detected; using the host store, skipping in-pod install."
          echo "present=true" >> "$GITHUB_OUTPUT"
          echo "NIX_REMOTE=daemon" >> "$GITHUB_ENV"
          # Enable flakes/nix-command for the in-pod Nix *client*. Normally the
          # DeterminateSystems installer (skipped on this branch) writes a pod
          # /etc/nix/nix.conf that turns these on. We only bind-mount the host's
          # /nix — NOT its /etc/nix — so the host's flakes-enabled config is
          # invisible inside the pod, and the host `nix` binary reads the pod's
          # (flakes-less) config dir. Without this, `nix-eval-jobs` flake eval
          # dies with "experimental Nix feature 'flakes' is disabled" and
          # `nix profile add nixpkgs#attic-client` (watch-store seed) fails too.
          # experimental-features is a client-side, non-daemon-restricted
          # setting, so an untrusted daemon client may set it via NIX_CONFIG.
          echo "NIX_CONFIG=extra-experimental-features = nix-command flakes" >> "$GITHUB_ENV"
          # The node mounts /nix but not /run/current-system, so expose the host
          # store's Nix CLI via the NixOS *system* profile, which lives under
          # /nix (so it comes with the mount) and carries nix. NB: the *default*
          # profile (/nix/var/nix/profiles/default) does NOT contain nix on
          # NixOS — verified on voldemort (Determinate Nix 3.21.1), where nix is
          # at /nix/var/nix/profiles/system/sw/bin/nix.
          echo "/nix/var/nix/profiles/system/sw/bin" >> "$GITHUB_PATH"
        else
          echo "No host Nix daemon; will install Nix in-pod."
          echo "present=false" >> "$GITHUB_OUTPUT"
        fi
    - if: ${{ steps.host-daemon.outputs.present != 'true' }}
      uses: DeterminateSystems/nix-installer-action@a7ad9c4f0c65208097f4d34f3cfa1913b80cce5c # main
      with:
        # Disable build fsync on CI runners. The nix-store workload is
        # fsync-bound (sqlite path-registration + small-file writes); on a
        # contended disk this serializes everything (~80% iowait observed on
        # voldemort). Runners are ephemeral, so trading crash-durability for
        # throughput is safe — a crashed job just re-runs. `fsync-store-paths`
        # already defaults to false; pinned here so a future default change
        # can't silently reintroduce the stall.
        extra-conf: |
          fsync-metadata = false
          fsync-store-paths = false
    - if: ${{ inputs.cache == 'true' && steps.host-daemon.outputs.present != 'true' }}
      uses: DeterminateSystems/flakehub-cache-action@9926dde74484ccb2224835b80531de64ed4336ef # main
      # TODO: Fix this
      # with:
      # use-gha-cache: enabled
    # Skipped when using a host daemon: client-side nix.conf edits don't take
    # effect for an untrusted daemon client, and the host daemon already carries
    # the homelab substituters/keys (Attic-first) from its NixOS config.
    - if: ${{ (inputs.extra-substituters != '' || inputs.extra-trusted-public-keys != '') && steps.host-daemon.outputs.present != 'true' }}
      shell: bash
      env:
        INPUT_EXTRA_SUBSTITUTERS: ${{ inputs.extra-substituters }}
        INPUT_EXTRA_TRUSTED_PUBLIC_KEYS: ${{ inputs.extra-trusted-public-keys }}
      run: bash "${{ github.action_path }}/configure-binary-cache.sh"
    # Best-effort incremental cache push: when Attic push creds are provided,
    # start `attic watch-store` in the background so every store path built in
    # this job is uploaded as it appears (survives concurrency cancellation and
    # seeds the detect job's nix-eval-jobs closure). Never fails the job.
    - if: ${{ inputs.attic-endpoint != '' && inputs.attic-cache-name != '' && inputs.attic-token != '' }}
      shell: bash
      env:
        INPUT_ATTIC_ENDPOINT: ${{ inputs.attic-endpoint }}
        INPUT_ATTIC_CACHE: ${{ inputs.attic-cache-name }}
        INPUT_ATTIC_TOKEN: ${{ inputs.attic-token }}
      run: bash "${{ github.action_path }}/start-attic-watch-store.sh"
