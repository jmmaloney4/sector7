name: Nix Setup
description: Install Nix and optionally configure additional binary caches for GitHub Actions
inputs:
  runs-on:
    description: Runner label to determine if runs-on/actions@v2 should be used
    required: true
    type: string
  cache:
    description: Enable FlakeHub cache (set to 'false' for self-hosted runners with cache already configured)
    required: false
    default: 'true'
  extra-substituters:
    description: Optional newline-delimited extra substituter URLs to append to the runner Nix config
    required: false
    default: ''
  extra-trusted-public-keys:
    description: Optional newline-delimited extra trusted public keys to append to the runner Nix config
    required: false
    default: ''
  attic-endpoint:
    description: Optional Attic server endpoint (root URL). When set together with attic-cache-name and attic-token, starts `attic watch-store` to push built store paths to the cache incrementally for the rest of the job.
    required: false
    default: ''
  attic-cache-name:
    description: Optional Attic cache name to push into via watch-store.
    required: false
    default: ''
  attic-token:
    description: Optional Attic token with push permission, used by watch-store.
    required: false
    default: ''
runs:
  using: composite
  steps:
    - if: ${{ contains(inputs.runs-on, 'runner=') }} && ${{ contains(inputs.runs-on, 's3-cache') }}
      uses: runs-on/action@d141ef83eb66d096ce8afc767e09115a65c63b60 # v2.1.2
      with:
        show_costs: true
        sccache: s3
    - uses: DeterminateSystems/nix-installer-action@1d87d45818068401a10cf16bdc5f00b24994a83f # main
      with:
        # Disable build fsync on CI runners. The nix-store workload is
        # fsync-bound (sqlite path-registration + small-file writes); on a
        # contended disk this serializes everything (~80% iowait observed on
        # voldemort). Runners are ephemeral, so trading crash-durability for
        # throughput is safe — a crashed job just re-runs. `fsync-store-paths`
        # already defaults to false; pinned here so a future default change
        # can't silently reintroduce the stall.
        extra-conf: |
          fsync-metadata = false
          fsync-store-paths = false
    - if: ${{ inputs.cache == 'true' }}
      uses: DeterminateSystems/flakehub-cache-action@f9c8d8aaf92e6dbde896d6f84350f33d62392bd5 # main
      # TODO: Fix this
      # with:
      # use-gha-cache: enabled
    - if: ${{ inputs.extra-substituters != '' || inputs.extra-trusted-public-keys != '' }}
      shell: bash
      env:
        INPUT_EXTRA_SUBSTITUTERS: ${{ inputs.extra-substituters }}
        INPUT_EXTRA_TRUSTED_PUBLIC_KEYS: ${{ inputs.extra-trusted-public-keys }}
      run: bash "${{ github.action_path }}/configure-binary-cache.sh"
    # Best-effort incremental cache push: when Attic push creds are provided,
    # start `attic watch-store` in the background so every store path built in
    # this job is uploaded as it appears (survives concurrency cancellation and
    # seeds the detect job's nix-eval-jobs closure). Never fails the job.
    - if: ${{ inputs.attic-endpoint != '' && inputs.attic-cache-name != '' && inputs.attic-token != '' }}
      shell: bash
      env:
        INPUT_ATTIC_ENDPOINT: ${{ inputs.attic-endpoint }}
        INPUT_ATTIC_CACHE: ${{ inputs.attic-cache-name }}
        INPUT_ATTIC_TOKEN: ${{ inputs.attic-token }}
      run: bash "${{ github.action_path }}/start-attic-watch-store.sh"
